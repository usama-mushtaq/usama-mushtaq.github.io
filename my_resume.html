<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume — Usama Mushtaq</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #08090a;
            font-family: -apple-system, sans-serif;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: #111214;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            flex-shrink: 0;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: #8b5cf6;
            font-size: 14px;
            font-weight: 500;
        }

        .back-btn:hover { opacity: 0.8; }

        .top-title {
            color: #71717a;
            font-size: 13px;
            font-weight: 500;
        }

        .download-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            color: #08090a;
            background: #8b5cf6;
            font-size: 12px;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 8px;
        }

        .download-btn:hover { opacity: 0.9; }

        .pdf-container {
            flex: 1;
            width: 100%;
            position: relative;
        }

        .pdf-container iframe,
        .pdf-container embed,
        .pdf-container object {
            width: 100%;
            height: 100%;
            border: none;
        }

        .fallback {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #e4e4e7;
            text-align: center;
            padding: 40px 20px;
        }

        .fallback-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .fallback-text {
            font-size: 16px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .fallback-sub {
            font-size: 13px;
            color: #71717a;
            margin-bottom: 24px;
        }

        .fallback-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: #08090a;
            background: #8b5cf6;
            font-size: 14px;
            font-weight: 600;
            padding: 14px 28px;
            border-radius: 12px;
        }

        .fallback-btn:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="./index.html" class="back-btn">← Back</a>
        <span class="top-title">Resume</span>
        <a href="./my_resume.pdf" download class="download-btn">↓ Save</a>
    </div>

    <div class="pdf-container" id="pdfContainer">
        <object data="./my_resume.pdf" type="application/pdf" width="100%" height="100%">
            <iframe src="./my_resume.pdf" width="100%" height="100%">
                <div class="fallback" id="fallback">
                    <div class="fallback-icon">📄</div>
                    <div class="fallback-text">PDF Preview Not Supported</div>
                    <div class="fallback-sub">Your browser can't display PDF inline</div>
                    <a href="./my_resume.pdf" download class="fallback-btn">↓ Download Resume</a>
                </div>
            </iframe>
        </object>
    </div>

    <script>
        setTimeout(function() {
            var obj = document.querySelector('object');
            var iframe = document.querySelector('iframe');
            try {
                if (obj && (!obj.contentDocument || obj.contentDocument.body.innerHTML === '')) {
                    document.getElementById('fallback').style.display = 'flex';
                    document.getElementById('pdfContainer').innerHTML = document.getElementById('fallback').outerHTML;
                }
            } catch(e) {}
        }, 3000);
    </script>

</body>
  </html>
