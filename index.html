<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="description" content="Usama Mushtaq — Application Developer specializing in Kotlin, Java & Android Development">

    <title>Usama Mushtaq | Application Developer</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <style>
       @font-face {
    font-family: 'Inter';
    font-weight: 400;
    font-style: normal;
    font-display: swap;
    src: url('./fonts/Inter_18pt-Regular.ttf') format('truetype');
}
@font-face {
    font-family: 'Inter';
    font-weight: 500;
    font-style: normal;
    font-display: swap;
    src: url('./fonts/Inter_18pt-Medium.ttf') format('truetype');
}
@font-face {
    font-family: 'Inter';
    font-weight: 600;
    font-style: normal;
    font-display: swap;
    src: url('./fonts/Inter_18pt-SemiBold.ttf') format('truetype');
}
@font-face {
    font-family: 'Inter';
    font-weight: 700;
    font-style: normal;
    font-display: swap;
    src: url('./fonts/Inter_18pt-Bold.ttf') format('truetype');
}
@font-face {
    font-family: 'Inter';
    font-weight: 800;
    font-style: normal;
    font-display: swap;
    src: url('./fonts/Inter_18pt-ExtraBold.ttf') format('truetype');
}
@font-face {
    font-family: 'JetBrains Mono';
    font-weight: 400;
    font-style: normal;
    font-display: swap;
    src: url('./fonts/JetBrainsMono-Regular.ttf') format('truetype');
}
@font-face {
    font-family: 'JetBrains Mono';
    font-weight: 500;
    font-style: normal;
    font-display: swap;
    src: url('./fonts/JetBrainsMono-Medium.ttf') format('truetype');
}

        :root {
            --bg: #08090a;
            --card-bg: rgba(255,255,255,0.025);
            --border: rgba(255,255,255,0.06);
            --text: #e4e4e7;
            --muted: #71717a;
            --dim: #3f3f46;
            --purple: #8b5cf6;
            --cyan: #06b6d4;
            --pink: #ec4899;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .bg-effects {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            animation: orbMove 25s ease-in-out infinite;
        }

        .orb-1 {
            width: 350px; height: 350px;
            background: rgba(139,92,246,0.25);
            top: -15%; right: -10%;
        }

        .orb-2 {
            width: 300px; height: 300px;
            background: rgba(6,182,212,0.2);
            bottom: -15%; left: -10%;
            animation-delay: -8s;
        }

        .orb-3 {
            width: 250px; height: 250px;
            background: rgba(236,72,153,0.15);
            top: 40%; left: 50%;
            transform: translate(-50%,-50%);
            animation-delay: -16s;
        }

        @keyframes orbMove {
            0%,100% { transform: translate(0,0) scale(1); }
            25% { transform: translate(40px,-50px) scale(1.15); }
            50% { transform: translate(-30px,30px) scale(0.9); }
            75% { transform: translate(50px,20px) scale(1.1); }
        }

        .grid-overlay {
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
            background-size: 70px 70px;
            z-index: 0;
        }

        .noise {
            position: fixed; inset: 0; z-index: 0;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        .main {
            position: relative; z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            height: 100dvh;
            padding: 16px 20px 12vh 20px;
        }

        .avatar-wrap {
            position: relative;
            margin-bottom: 24px;
        }

        .avatar-ring {
            position: absolute;
            inset: -5px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, var(--purple), var(--pink), var(--cyan), var(--purple));
            animation: spin 4s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .avatar-ring::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: conic-gradient(from 0deg, var(--purple), var(--pink), var(--cyan), var(--purple));
            filter: blur(18px);
            opacity: 0.4;
            animation: spin 4s linear infinite;
        }

        .avatar {
            position: relative;
            width: 96px; height: 96px;
            border-radius: 50%;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
            border: 4px solid var(--bg);
        }

        .avatar-text {
            font-size: 30px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--purple), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .status-dot {
            position: absolute;
            bottom: 6px; right: 6px;
            width: 16px; height: 16px;
            background: #22c55e;
            border-radius: 50%;
            border: 3px solid var(--bg);
            z-index: 2;
        }

        .status-dot::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 2px solid rgba(34,197,94,0.6);
            animation: ping 2s cubic-bezier(0,0,0.2,1) infinite;
        }

        @keyframes ping {
            75%,100% { transform: scale(2.2); opacity: 0; }
        }

        .name {
            font-size: 40px;
            font-weight: 800;
            letter-spacing: -2px;
            text-align: center;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ffffff 0%, #a1a1aa 40%, #ffffff 80%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 5s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%,100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .title-row {
            display: flex;
            align-items: center;
            gap: 3px;
            margin-bottom: 8px;
            height: 22px;
        }

        .title-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 15px;
            color: var(--purple);
            font-weight: 500;
        }

        .type-cursor {
            display: inline-block;
            width: 2px; height: 18px;
            background: var(--purple);
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%,100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .tagline {
            font-size: 14px;
            color: var(--muted);
            text-align: center;
            margin-bottom: 18px;
            max-width: 320px;
            line-height: 1.5;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 7px 18px;
            border-radius: 100px;
            background: rgba(34,197,94,0.07);
            border: 1px solid rgba(34,197,94,0.15);
            font-size: 13px;
            color: #4ade80;
            font-weight: 500;
            margin-bottom: 30px;
            letter-spacing: 0.3px;
        }

        .badge-dot {
            width: 7px; height: 7px;
            background: #22c55e;
            border-radius: 50%;
        }

        .cta-group {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .cta {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px 22px;
            border-radius: 16px;
            text-decoration: none;
            color: var(--text);
            background: var(--card-bg);
            border: 1px solid var(--border);
            transition: all 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        .cta:focus {
            outline: none;
            border-color: var(--border);
            box-shadow: none;
            background: var(--card-bg);
            transform: none;
        }

        .cta:focus:not(:focus-visible) {
            outline: none;
            border-color: var(--border);
            box-shadow: none;
            background: var(--card-bg);
            transform: none;
        }

        .cta::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.02), transparent);
            transition: left 0.6s ease;
        }

        @media (hover: hover) and (pointer: fine) {
            .cta:hover::before { left: 100%; }

            .cta:hover {
                transform: translateY(-4px);
                border-color: transparent;
            }

            .cta-ln:hover {
                background: rgba(10,102,194,0.08);
                box-shadow:
                    0 12px 40px rgba(10,102,194,0.18),
                    0 0 0 1px rgba(10,102,194,0.35),
                    inset 0 1px 0 rgba(255,255,255,0.05);
            }

            .cta-gh:hover {
                background: rgba(126,231,135,0.05);
                box-shadow:
                    0 12px 40px rgba(126,231,135,0.12),
                    0 0 0 1px rgba(126,231,135,0.25),
                    inset 0 1px 0 rgba(255,255,255,0.05);
            }

            .cta-cv:hover {
                background: rgba(251,146,60,0.06);
                box-shadow:
                    0 12px 40px rgba(251,146,60,0.15),
                    0 0 0 1px rgba(251,146,60,0.3),
                    inset 0 1px 0 rgba(255,255,255,0.05);
            }

            .cta:hover .cta-icon { transform: scale(1.1) rotate(-3deg); }

            .cta:hover .cta-arrow { transform: translateX(6px); }
            .cta-ln:hover .cta-arrow { color: #3b82f6; }
            .cta-gh:hover .cta-arrow { color: #7ee787; }
            .cta-cv:hover .cta-arrow { color: #fb923c; }
        }

        .cta:active {
            transform: scale(0.98);
            transition: transform 0.1s ease;
        }

        .cta-icon {
            width: 46px; height: 46px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .cta-ln .cta-icon { background: rgba(10,102,194,0.12); }
        .cta-gh .cta-icon { background: rgba(255,255,255,0.06); }
        .cta-cv .cta-icon { background: rgba(251,146,60,0.1); }

        .cta-icon svg {
            width: 22px; height: 22px;
        }

        .cta-body { flex: 1; }

        .cta-label {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 3px;
        }

        .cta-sub {
            font-size: 12px;
            color: var(--muted);
            font-weight: 400;
        }

        .cta-arrow {
            font-size: 18px;
            color: var(--dim);
            transition: all 0.3s ease;
        }

        .rv {
            opacity: 0;
            transform: translateY(28px);
            animation: reveal 0.75s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
        }

        .d1{animation-delay:.15s}
        .d2{animation-delay:.3s}
        .d3{animation-delay:.45s}
        .d4{animation-delay:.55s}
        .d5{animation-delay:.65s}
        .d6{animation-delay:.8s}
        .d7{animation-delay:.95s}
        .d8{animation-delay:1.1s}

        @keyframes reveal {
            to { opacity:1; transform:translateY(0); }
        }

        @media(max-width:480px){
            .main{padding:16px 16px 14vh 16px}
            .name{font-size:32px;letter-spacing:-1.2px}
            .title-text{font-size:14px}
            .tagline{font-size:14px}
            .cta{padding:16px 18px;border-radius:14px}
            .cta-icon{width:42px;height:42px;border-radius:10px}
            .cta-icon svg{width:20px;height:20px}
            .cta-label{font-size:15px}
        }

        @media(min-width:768px){
            .name{font-size:48px}
            .title-text{font-size:16px}
            .tagline{font-size:15px}
            .cta-label{font-size:17px}
            .cta-sub{font-size:13px}
        }
    </style>
</head>
<body>

    <div class="bg-effects">

        </div>

        <p class="tagline rv d4">Crafting robust mobile & desktop applications with clean, efficient code.</p>

        <div class="badge rv d5">
            <span class="badge-dot"></span>
            Open to opportunities
        </div>

        <div class="cta-group">

            <a href="https://www.linkedin.com/in/TUMHARA-LINKEDIN-ID" target="_blank" rel="noopener" class="cta cta-ln rv d6">
                <div class="cta-icon">
                    <svg viewBox="0 0 24 24" fill="#60a5fa">
                        <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>

                <div class="cta-body">
                    <div class="cta-label">LinkedIn</div>
                    <div class="cta-sub">Let's connect professionally</div>
                </div>
                <span class="cta-arrow">→</span>
            </a>

            <a href="https://github.com/TUMHARA-GITHUB-USERNAME" target="_blank" rel="noopener" class="cta cta-gh rv d7">
                <div class="cta-icon">
                    <svg viewBox="0 0 24 24" fill="#7ee787">

                    </svg>
                </div>
                <div class="cta-body">
                    <div class="cta-label">GitHub</div>
                    <div class="cta-sub">Explore my repositories</div>
                </div>
                <span class="cta-arrow">→</span>
            </a>

            <a href="./my_resume.html" target="_blank" rel="noopener" class="cta cta-cv rv d8">
                <div class="cta-icon">
                    <svg viewBox="0 0 24 24" fill="#fb923c">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 2l5 5h-5V4zM8 17v-1h8v1H8zm0-3v-1h8v1H8zm0-3v-1h5v1H8z"/>
                    </svg>
                </div>
                <div class="cta-body">
                    <div class="cta-label">Resume</div>
                    <div class="cta-sub">Download my CV</div>

            </a>

        </div>

    </main>

    <script>
        const text = "Application Developer";
        const el = document.getElementById('typewriter');
        let i = 0;
        function type() {
            if (i < text.length) {
                el.textContent += text.charAt(i);
                i++;
                setTimeout(type, 85);
            }
        }
        setTimeout(type, 1200);

        document.addEventListener('touchstart', function(e) {
            if (!e.target.closest('.cta')) {
                document.querySelectorAll('.cta').forEach(function(btn) {
                    btn.blur();
                });
            }
        });
    </script>
