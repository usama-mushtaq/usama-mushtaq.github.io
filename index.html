<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#08090a">
    <meta name="description" content="Usama Mushtaq — Application Developer specializing in Kotlin, Java & Android Development">
    <meta property="og:title" content="Usama Mushtaq | Application Developer">
    <meta property="og:description" content="Application Developer | Kotlin • Java • C++ • Android">
    <title>Usama Mushtaq | Application Developer</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <style>
        @font-face {
            font-family: 'Inter';
            font-weight: 400;
            font-style: normal;
            font-display: swap;
            src: url('./fonts/Inter_18pt-Regular.ttf') format('truetype');
        }
        @font-face {
            font-family: 'Inter';
            font-weight: 500;
            font-style: normal;
            font-display: swap;
            src: url('./fonts/Inter_18pt-Medium.ttf') format('truetype');
        }
        @font-face {
            font-family: 'Inter';
            font-weight: 600;
            font-style: normal;
            font-display: swap;
            src: url('./fonts/Inter_18pt-SemiBold.ttf') format('truetype');
        }
        @font-face {
            font-family: 'Inter';
            font-weight: 700;
            font-style: normal;
            font-display: swap;
            src: url('./fonts/Inter_18pt-Bold.ttf') format('truetype');
        }
        @font-face {
            font-family: 'Inter';
            font-weight: 800;
            font-style: normal;
            font-display: swap;
            src: url('./fonts/Inter_18pt-ExtraBold.ttf') format('truetype');
        }
        @font-face {
            font-family: 'JetBrains Mono';
            font-weight: 400;
            font-style: normal;
            font-display: swap;
            src: url('./fonts/JetBrainsMono-Regular.ttf') format('truetype');
        }
        @font-face {
            font-family: 'JetBrains Mono';
            font-weight: 500;
            font-style: normal;
            font-display: swap;
            src: url('./fonts/JetBrainsMono-Medium.ttf') format('truetype');
        }

        :root {
            --bg: #08090a;
            --card-bg: rgba(255,255,255,0.025);
            --border: rgba(255,255,255,0.06);
            --text: #e4e4e7;
            --muted: #71717a;
            --dim: #3f3f46;
            --purple: #8b5cf6;
            --cyan: #06b6d4;
            --pink: #ec4899;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            height: 100%;
        }

        body {
            min-height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            /* Pull-to-refresh allowed — NO overflow:hidden */
        }

        /* ─── Background Effects ─── */
        .bg-effects {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            animation: orbMove 25s ease-in-out infinite;
        }

        .orb-1 {
            width: 35vw; height: 35vw;
            max-width: 420px; max-height: 420px;
            min-width: 180px; min-height: 180px;
            background: rgba(139,92,246,0.25);
            top: -10%; right: -8%;
        }
        .orb-2 {
            width: 30vw; height: 30vw;
            max-width: 360px; max-height: 360px;
            min-width: 150px; min-height: 150px;
            background: rgba(6,182,212,0.2);
            bottom: -10%; left: -8%;
            animation-delay: -8s;
        }
        .orb-3 {
            width: 25vw; height: 25vw;
            max-width: 300px; max-height: 300px;
            min-width: 120px; min-height: 120px;
            background: rgba(236,72,153,0.15);
            top: 50%; left: 50%;
            animation-delay: -16s;
        }

        @keyframes orbMove {
            0%,100% { transform: translate(0,0) scale(1); }
            25%      { transform: translate(40px,-50px) scale(1.15); }
            50%      { transform: translate(-30px,30px) scale(0.9); }
            75%      { transform: translate(50px,20px) scale(1.1); }
        }

        .orb-3 { animation: orbMove3 25s ease-in-out infinite; animation-delay: -16s; }
        @keyframes orbMove3 {
            0%,100% { transform: translate(-50%,-50%) scale(1); }
            25%      { transform: translate(calc(-50% + 40px),calc(-50% - 50px)) scale(1.15); }
            50%      { transform: translate(calc(-50% - 30px),calc(-50% + 30px)) scale(0.9); }
            75%      { transform: translate(calc(-50% + 50px),calc(-50% + 20px)) scale(1.1); }
        }

        .grid-overlay {
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
            background-size: 70px 70px;
            z-index: 0;
            pointer-events: none;
        }

        .noise {
            position: fixed; inset: 0; z-index: 0;
            opacity: 0.025;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        /* ══════════════════════════════════
           PAGE 1 — Main Landing
        ══════════════════════════════════ */
        #page-main {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            min-height: 100dvh;
            position: relative;
            z-index: 1;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Mobile: top-biased, content pushed upward */
            justify-content: flex-start;
            padding-top: clamp(5vh, 7vh, 9vh);
            padding-bottom: clamp(20px, 4vh, 40px);
            padding-left: clamp(14px, 4vw, 40px);
            padding-right: clamp(14px, 4vw, 40px);
        }

        /* Desktop: perfectly centered */
        @media (min-width: 700px) {
            .main {
                justify-content: center;
                padding-top: clamp(24px, 5vw, 60px);
                padding-bottom: clamp(24px, 5vw, 60px);
            }
        }

        /* ─── Avatar ─── */
        .avatar-wrap {
            position: relative;
            margin-bottom: clamp(12px, 2.4vh, 28px);
            flex-shrink: 0;
        }

        .avatar-ring {
            position: absolute;
            inset: -5px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, var(--purple), var(--pink), var(--cyan), var(--purple));
            animation: spin 4s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .avatar-ring::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: conic-gradient(from 0deg, var(--purple), var(--pink), var(--cyan), var(--purple));
            filter: blur(18px);
            opacity: 0.4;
            animation: spin 4s linear infinite;
        }

        .avatar {
            position: relative;
            width: clamp(80px, 13vw, 106px);
            height: clamp(80px, 13vw, 106px);
            border-radius: 50%;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
            border: 4px solid var(--bg);
        }

        /* UM — mathematically perfect center */
        .avatar-text {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(22px, 4.5vw, 34px);
            font-weight: 800;
            line-height: 1;
            letter-spacing: 0;
            background: linear-gradient(135deg, var(--purple), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-dot {
            position: absolute;
            bottom: 3px; right: 3px;
            width: clamp(12px, 2vw, 17px);
            height: clamp(12px, 2vw, 17px);
            background: #22c55e;
            border-radius: 50%;
            border: 3px solid var(--bg);
            z-index: 2;
        }

        .status-dot::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 2px solid rgba(34,197,94,0.6);
            animation: ping 2s cubic-bezier(0,0,0.2,1) infinite;
        }

        @keyframes ping {
            75%,100% { transform: scale(2.2); opacity: 0; }
        }

        /* ─── Name ─── */
        .name {
            font-size: clamp(32px, 7.5vw, 56px);
            font-weight: 800;
            letter-spacing: -1.5px;
            text-align: center;
            margin-bottom: clamp(7px, 1.4vh, 14px);
            background: linear-gradient(135deg, #ffffff 0%, #a1a1aa 40%, #ffffff 80%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 5s ease-in-out infinite;
            line-height: 1.12;
            flex-shrink: 0;
        }

        @keyframes shimmer {
            0%,100% { background-position: 0% 50%; }
            50%      { background-position: 100% 50%; }
        }

        /* ─── Typewriter ─── */
        .title-row {
            display: flex;
            align-items: center;
            gap: 3px;
            margin-bottom: clamp(7px, 1.4vh, 13px);
            height: clamp(22px, 3.8vh, 32px);
            flex-shrink: 0;
        }

        .title-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(14px, 3vw, 19px);
            color: var(--purple);
            font-weight: 500;
        }

        .type-cursor {
            display: inline-block;
            width: 2px;
            height: clamp(16px, 2.8vh, 22px);
            background: var(--purple);
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%,100% { opacity: 1; }
            50%      { opacity: 0; }
        }

        /* ─── Tagline ─── */
        .tagline {
            font-size: clamp(13.5px, 2.2vw, 16px);
            color: var(--muted);
            text-align: center;
            margin-bottom: clamp(10px, 1.8vh, 20px);
            max-width: min(380px, 88vw);
            line-height: 1.6;
            flex-shrink: 0;
        }

        /* ─── Badge ─── */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 9px;
            padding: clamp(7px, 1.2vh, 10px) clamp(18px, 3.5vw, 24px);
            border-radius: 100px;
            background: rgba(34,197,94,0.07);
            border: 1px solid rgba(34,197,94,0.15);
            font-size: clamp(13px, 2vw, 15px);
            color: #4ade80;
            font-weight: 500;
            margin-bottom: clamp(18px, 3.5vh, 38px);
            letter-spacing: 0.3px;
            flex-shrink: 0;
        }

        .badge-dot {
            width: 8px; height: 8px;
            background: #22c55e;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* ─── CTA Group — Mobile vertical ─── */
        .cta-group {
            width: 100%;
            max-width: min(920px, 94vw);
            display: flex;
            flex-direction: column;
            gap: clamp(10px, 1.8vh, 15px);
            flex-shrink: 0;
        }

        /* ─── CTA Card — Mobile ─── */
        .cta {
            display: flex;
            align-items: center;
            gap: clamp(14px, 3vw, 20px);
            /* Bigger padding so cards fill bottom space */
            padding: clamp(17px, 3vh, 26px) clamp(18px, 4vw, 28px);
            border-radius: 18px;
            text-decoration: none;
            color: var(--text);
            background: var(--card-bg);
            border: 1px solid var(--border);
            transition: all 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            outline: none;
            cursor: pointer;
        }

        .cta:focus,
        .cta:focus:not(:focus-visible) {
            outline: none;
            border-color: var(--border);
            box-shadow: none;
            background: var(--card-bg);
            transform: none;
        }

        .cta::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.025), transparent);
            transition: left 0.6s ease;
        }

        /* ─── CTA Icon — Mobile ─── */
        .cta-icon {
            width: clamp(48px, 10vw, 58px);
            height: clamp(48px, 10vw, 58px);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .cta-ln .cta-icon { background: rgba(10,102,194,0.12); }
        .cta-gh .cta-icon { background: rgba(255,255,255,0.06); }
        .cta-cv .cta-icon { background: rgba(251,146,60,0.1); }

        .cta-icon svg {
            width: clamp(22px, 4.5vw, 28px);
            height: clamp(22px, 4.5vw, 28px);
        }

        .cta-body { flex: 1; }

        .cta-label {
            font-size: clamp(16px, 3vw, 18px);
            font-weight: 600;
            margin-bottom: 4px;
        }

        .cta-sub {
            font-size: clamp(12.5px, 2vw, 14px);
            color: var(--muted);
            font-weight: 400;
        }

        .cta-arrow {
            font-size: 20px;
            color: var(--dim);
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        /* ══════════════════════════════════
           Wide screen — Horizontal cards
        ══════════════════════════════════ */
        @media (min-width: 700px) {
            .cta-group {
                flex-direction: row;
                align-items: stretch;
            }
            .cta {
                flex: 1;
                flex-direction: column;
                align-items: center;
                text-align: center;
                padding: clamp(26px, 4vh, 42px) clamp(20px, 2.5vw, 32px);
                gap: clamp(16px, 2.5vh, 22px);
                justify-content: center;
            }
            .cta-body { flex: unset; }
            .cta-arrow { display: none; }
            .cta-icon {
                width: clamp(60px, 8vw, 76px);
                height: clamp(60px, 8vw, 76px);
                border-radius: 20px;
            }
            .cta-icon svg {
                width: clamp(28px, 4vw, 34px);
                height: clamp(28px, 4vw, 34px);
            }
            .cta-label { font-size: clamp(17px, 2.1vw, 20px); }
            .cta-sub   { font-size: clamp(12px, 1.3vw, 14px); }
        }

        /* ─── Hover effects — desktop only ─── */
        @media (hover: hover) and (pointer: fine) {
            .cta:hover::before { left: 100%; }
            .cta:hover { transform: translateY(-5px); border-color: transparent; }
            .cta-ln:hover {
                background: rgba(10,102,194,0.09);
                box-shadow: 0 14px 44px rgba(10,102,194,0.2),
                            0 0 0 1px rgba(10,102,194,0.38),
                            inset 0 1px 0 rgba(255,255,255,0.05);
            }
            .cta-gh:hover {
                background: rgba(126,231,135,0.06);
                box-shadow: 0 14px 44px rgba(126,231,135,0.14),
                            0 0 0 1px rgba(126,231,135,0.28),
                            inset 0 1px 0 rgba(255,255,255,0.05);
            }
            .cta-cv:hover {
                background: rgba(251,146,60,0.07);
                box-shadow: 0 14px 44px rgba(251,146,60,0.17),
                            0 0 0 1px rgba(251,146,60,0.32),
                            inset 0 1px 0 rgba(255,255,255,0.05);
            }
            .cta:hover .cta-icon  { transform: scale(1.1) rotate(-3deg); }
            .cta:hover .cta-arrow { transform: translateX(6px); }
            .cta-ln:hover .cta-arrow { color: #3b82f6; }
            .cta-gh:hover .cta-arrow { color: #7ee787; }
            .cta-cv:hover .cta-arrow { color: #fb923c; }
        }

        .cta:active {
            transform: scale(0.97) !important;
            transition: transform 0.1s ease !important;
        }

        /* ─── Reveal Animations ─── */
        .rv {
            opacity: 0;
            transform: translateY(22px);
            animation: reveal 0.7s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
        }
        .d1 { animation-delay: .12s; }
        .d2 { animation-delay: .26s; }
        .d3 { animation-delay: .38s; }
        .d4 { animation-delay: .48s; }
        .d5 { animation-delay: .58s; }
        .d6 { animation-delay: .70s; }
        .d7 { animation-delay: .83s; }
        .d8 { animation-delay: .96s; }

        @keyframes reveal {
            to { opacity: 1; transform: translateY(0); }
        }

        /* ─── Very short landscape screens ─── */
        @media (max-height: 500px) {
            .main { padding-top: 8px; }
            .avatar-wrap { margin-bottom: 6px; }
            .badge { margin-bottom: 10px; }
            .name { font-size: clamp(22px, 5vw, 34px); margin-bottom: 4px; }
            .tagline { font-size: 12px; margin-bottom: 8px; }
            .title-row { margin-bottom: 4px; }
        }

        /* ══════════════════════════════════
           PAGE 2 — Resume Viewer
        ══════════════════════════════════ */
        #page-resume {
            display: none;
            flex-direction: column;
            min-height: 100vh;
            min-height: 100dvh;
            position: relative;
            z-index: 1;
        }

        .resume-topbar {
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: clamp(12px, 2.5vw, 18px) clamp(16px, 4vw, 32px);
            background: rgba(8,9,10,0.88);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 9px 18px;
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.25s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-back:hover {
            background: rgba(255,255,255,0.09);
            border-color: rgba(255,255,255,0.14);
        }
        .btn-back svg { width: 16px; height: 16px; }

        .btn-download {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 9px 20px;
            border-radius: 10px;
            background: rgba(251,146,60,0.12);
            border: 1px solid rgba(251,146,60,0.28);
            color: #fb923c;
            font-family: 'Inter', -apple-system, sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.25s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-download:hover {
            background: rgba(251,146,60,0.2);
            border-color: rgba(251,146,60,0.45);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(251,146,60,0.2);
        }
        .btn-download:active { transform: scale(0.97); }
        .btn-download svg { width: 16px; height: 16px; }

        .resume-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: clamp(16px, 3vw, 32px) clamp(12px, 3vw, 24px) clamp(24px, 4vw, 40px);
        }

        .resume-img-wrap {
            width: 100%;
            max-width: 820px;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 24px 80px rgba(0,0,0,0.5);
        }

        .resume-img-wrap img {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>

    <!-- ══════════════════════════════════
         PAGE 2 — Resume Viewer
    ══════════════════════════════════ -->
    <div id="page-resume">

        <div class="resume-topbar">
            <button class="btn-back" id="btn-back" aria-label="Go back">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"/>

                Back
            </button>

            <a href="./my_resume.pdf" download="Usama_Mushtaq_Resume.pdf"
               class="btn-download">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                Download PDF
            </a>
        </div>

        <div class="resume-body">
            <div class="resume-img-wrap">
                <img src="./resume_preview.png"
                     alt="Usama Mushtaq — Resume Preview"
                     loading="lazy">
            </div>
        </div>

    </div>

    <script>
        /* ── Typewriter ── */
        const typeEl   = document.getElementById('typewriter');
        const typeText = "Application Developer";
        let ti = 0;
        function type() {
            if (ti < typeText.length) {
                typeEl.textContent += typeText.charAt(ti++);
                setTimeout(type, 85);
            }
        }
        setTimeout(type, 1200);

        /* ── Touch blur fix ── */
        document.addEventListener('touchstart', function(e) {
            if (!e.target.closest('.cta')) {
                document.querySelectorAll('.cta').forEach(b => b.blur());
            }
        }, { passive: true });

        /* ── Pages ── */
        const pageMain   = document.getElementById('page-main');
        const pageResume = document.getElementById('page-resume');
        const btnBack    = document.getElementById('btn-back');
        const resumeCard = document.getElementById('resume-card');
        const resumeSub  = document.getElementById('resume-sub');
        const pdfPath    = './my_resume.pdf';

        /* ── PDF inline detection ── */
        function canViewPdfInline() {
            const isDesktop = window.matchMedia('(min-width: 900px) and (pointer: fine)').matches;
            if (isDesktop) return true;
            const plugins = Array.from(navigator.plugins || []);
            const hasPdfPlugin = plugins.some(p =>
                /pdf/i.test(p.name) || /chrome pdf/i.test(p.name) || /acrobat/i.test(p.name)
            );
            if (hasPdfPlugin) return true;
            const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
            if (isMobile) return false;
            return false;
        }

        /* ── Page switching with history ── */
        function showResumePage() {
            pageMain.style.display   = 'none';
            pageResume.style.display = 'flex';
            window.scrollTo(0, 0);
            history.pushState({ page: 'resume' }, '', '#resume');
        }

        function showMainPage() {
            pageResume.style.display = 'none';
            pageMain.style.display   = 'flex';
            window.scrollTo(0, 0);
        }

        window.addEventListener('popstate', function() {
            if (!location.hash || location.hash !== '#resume') {
                if (pageResume.style.display === 'flex') showMainPage();
            }
        });

        if (location.hash === '#resume') {
            history.replaceState({}, '', location.pathname);
        }

        /* ── Resume card behavior ── */
        if (canViewPdfInline()) {
            resumeSub.textContent = 'View inline or download';
            resumeCard.addEventListener('click', () => window.open(pdfPath, '_blank', 'noopener'));
            resumeCard.addEventListener('keydown', e => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    window.open(pdfPath, '_blank', 'noopener');
                }
            });
        } else {
            resumeSub.textContent = 'Preview & download CV';
            resumeCard.addEventListener('click', showResumePage);
            resumeCard.addEventListener('keydown', e => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    showResumePage();
                }
            });
        }

        btnBack.addEventListener('click', () => history.back());
    </script>
